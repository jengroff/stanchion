site_name: Stanchion
site_description: Framework-agnostic reliability primitives for agent pipelines
site_url: https://jengroff.github.io/stanchion
repo_url: https://github.com/jengroff/stanchion
repo_name: jengroff/stanchion

theme:
  name: material
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
  palette:
    - scheme: default
      primary: indigo

nav:
  - Home: index.md
  - Concepts: concepts.md
  - API Reference:
      - Runner: api/runner.md
      - Contracts: api/contracts.md
      - Checkpointing: api/checkpoint.md
      - Cost Tracking: api/cost.md
      - Failures: api/failures.md
      - Tracing: api/trace.md
      - LangGraph Adapter: api/langgraph.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
